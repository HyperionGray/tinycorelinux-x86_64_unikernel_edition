# Conservative Boot Configuration
# This configuration provides moderate optimization with low risk

[boot]
kernel_params = quiet loglevel=3 norestore nodhcp
memory = 256M
optimization_level = conservative
boot_timeout = 30

[services]
# Essential services to keep enabled
enable = udev,networking,syslog
# Non-essential services to disable
disable = bluetooth,sound,firewire,pcmcia

[performance]
target_boot_time = 2000ms
target_memory_usage = 64MB
risk_level = low

[compatibility]
# Maintain compatibility with most hardware
hardware_support = full
driver_loading = auto
fallback_mode = enabled